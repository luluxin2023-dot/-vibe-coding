<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>麻师傅的报告中心</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf3 100%);
      min-height: 100vh;
      padding: 60px 20px;
      color: #2c3e50;
    }
    .container { max-width: 800px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 50px; }
    .header h1 {
      font-size: 36px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
    .header p { color: #7f8c8d; font-size: 16px; }

    .section-title {
      font-size: 18px;
      color: #34495e;
      margin: 36px 0 16px;
      padding-left: 12px;
      border-left: 4px solid #667eea;
    }

    .report-card {
      display: block;
      background: #fff;
      padding: 24px 28px;
      margin-bottom: 16px;
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transition: all 0.25s ease;
      border-left: 4px solid #667eea;
    }
    .report-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(102,126,234,0.18);
    }
    .report-card .title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .report-card .desc { color: #7f8c8d; font-size: 14px; line-height: 1.6; margin-bottom: 10px; }
    .report-card .meta { color: #95a5a6; font-size: 12px; }
    .report-card .tag {
      display: inline-block;
      padding: 2px 10px;
      background: #f0f3ff;
      color: #667eea;
      border-radius: 10px;
      font-size: 12px;
      margin-right: 6px;
    }

    .footer {
      text-align: center;
      margin-top: 60px;
      color: #95a5a6;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 麻师傅的报告中心</h1>
      <p>市场人 0-1 学代码 · 营销诊断 & 方案集合</p>
    </div>

    <div class="section-title">📈 客户诊断报告</div>

    <a class="report-card" href="reports/chexiang-2026-05-19/">
      <div class="title">车享客户账户诊断报告</div>
      <div class="desc">广告消耗从峰值 27万/天 跌至 1.8万/天（-93%），出价骤降引发的传导分析与优化建议。</div>
      <div class="meta">
        <span class="tag">广告诊断</span>
        <span class="tag">案例分析</span>
        2026-05-19
      </div>
    </a>

    <!-- 以后新增报告，复制上面这一段 a 标签，改链接和文字即可 -->

    <div class="footer">
      Powered by GitHub Pages · 由 luluxin2023-dot 维护
    </div>
  </div>
</body>
</html>
